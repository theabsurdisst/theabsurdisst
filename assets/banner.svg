<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030a03"/>
      <stop offset="50%" stop-color="#071207"/>
      <stop offset="100%" stop-color="#0c1c0c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes fall1 {
        0%   { transform: translate(310px, -15px) rotate(0deg);   opacity: 0; }
        8%   { opacity: 0.85; }
        90%  { opacity: 0.6; }
        100% { transform: translate(348px, 270px) rotate(200deg); opacity: 0; }
      }
      @keyframes fall2 {
        0%   { transform: translate(270px, -15px) rotate(25deg);  opacity: 0; }
        8%   { opacity: 0.75; }
        90%  { opacity: 0.5; }
        100% { transform: translate(240px, 270px) rotate(230deg); opacity: 0; }
      }
      @keyframes fall3 {
        0%   { transform: translate(355px, -15px) rotate(-15deg); opacity: 0; }
        8%   { opacity: 0.9; }
        90%  { opacity: 0.45; }
        100% { transform: translate(390px, 270px) rotate(170deg); opacity: 0; }
      }
      @keyframes fall4 {
        0%   { transform: translate(290px, -15px) rotate(40deg);  opacity: 0; }
        12%  { opacity: 0.7; }
        88%  { opacity: 0.55; }
        100% { transform: translate(258px, 270px) rotate(260deg); opacity: 0; }
      }
      @keyframes fall5 {
        0%   { transform: translate(335px, -15px) rotate(-30deg); opacity: 0; }
        10%  { opacity: 0.8; }
        90%  { opacity: 0.4; }
        100% { transform: translate(370px, 270px) rotate(150deg); opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.75; }
      }
      @keyframes subtleShift {
        0%, 100% { fill: #58f07a; }
        50%       { fill: #6fffaa; }
      }
      .leaf1 { animation: fall1 5.2s ease-in infinite; }
      .leaf2 { animation: fall2 6.8s ease-in infinite 1.6s; }
      .leaf3 { animation: fall3 4.8s ease-in infinite 3.1s; }
      .leaf4 { animation: fall4 7.2s ease-in infinite 0.7s; }
      .leaf5 { animation: fall5 5.8s ease-in infinite 4.5s; }
      .title { animation: subtleShift 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="url(#bgGrad)" rx="14"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
  </radialGradient>
  <rect width="900" height="260" fill="url(#vignette)" rx="14"/>

  <!-- ===== BONSAI ===== -->

  <!-- Pot -->
  <rect x="150" y="224" width="68" height="22" rx="4" fill="#3a2718"/>
  <rect x="144" y="219" width="80" height="9" rx="3" fill="#4a3222"/>
  <!-- Pot highlight -->
  <rect x="148" y="220" width="50" height="3" rx="2" fill="#5a3e2a" opacity="0.5"/>

  <!-- Main trunk -->
  <path d="M183 219 C180 198 177 176 174 156 C171 140 175 126 170 112 C165 98 156 88 150 75"
        stroke="#5a3a24" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M150 75 C145 62 142 52 138 40"
        stroke="#5a3a24" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Right branch -->
  <path d="M172 145 C188 132 210 126 232 120"
        stroke="#5a3a24" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M232 120 C250 114 268 111 285 107"
        stroke="#5a3a24" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Left branch -->
  <path d="M174 158 C158 146 136 140 112 136"
        stroke="#5a3a24" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M112 136 C94 132 78 130 64 128"
        stroke="#5a3a24" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Upper-right branch -->
  <path d="M155 98 C168 88 190 82 212 77"
        stroke="#5a3a24" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Upper-left branch -->
  <path d="M148 72 C138 60 122 54 104 50"
        stroke="#5a3a24" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Foliage — back layer (darkest) -->
  <ellipse cx="68"  cy="122" rx="24" ry="19" fill="#092b09" opacity="0.9"/>
  <ellipse cx="108" cy="130" rx="30" ry="24" fill="#0b3010" opacity="0.9"/>
  <ellipse cx="280" cy="100" rx="24" ry="19" fill="#092b09" opacity="0.9"/>
  <ellipse cx="240" cy="114" rx="28" ry="22" fill="#0b3010" opacity="0.9"/>
  <ellipse cx="212" cy="70"  rx="26" ry="21" fill="#092b09" opacity="0.9"/>
  <ellipse cx="148" cy="46"  rx="35" ry="28" fill="#0a2e0a" opacity="0.95"/>

  <!-- Foliage — mid layer -->
  <ellipse cx="72"  cy="116" rx="19" ry="15" fill="#0f4212" opacity="0.9"/>
  <ellipse cx="112" cy="124" rx="23" ry="18" fill="#124814" opacity="0.9"/>
  <ellipse cx="276" cy="94"  rx="20" ry="16" fill="#0f4212" opacity="0.9"/>
  <ellipse cx="244" cy="108" rx="22" ry="17" fill="#124814" opacity="0.9"/>
  <ellipse cx="216" cy="64"  rx="21" ry="17" fill="#124814" opacity="0.9"/>
  <ellipse cx="144" cy="40"  rx="28" ry="23" fill="#145816" opacity="0.9"/>

  <!-- Foliage — top highlight layer -->
  <ellipse cx="76"  cy="112" rx="12" ry="9"  fill="#196b1c" opacity="0.8"/>
  <ellipse cx="116" cy="119" rx="14" ry="10" fill="#1a7020" opacity="0.8"/>
  <ellipse cx="274" cy="89"  rx="12" ry="9"  fill="#196b1c" opacity="0.8"/>
  <ellipse cx="248" cy="103" rx="14" ry="10" fill="#1a7020" opacity="0.8"/>
  <ellipse cx="218" cy="59"  rx="13" ry="10" fill="#1a7020" opacity="0.8"/>
  <ellipse cx="140" cy="34"  rx="18" ry="14" fill="#1d8022" opacity="0.8"/>

  <!-- Specular highlights -->
  <ellipse cx="138" cy="31" rx="8"  ry="5"  fill="#28aa30" opacity="0.35"/>
  <ellipse cx="114" cy="116" rx="5" ry="3.5" fill="#28aa30" opacity="0.25"/>
  <ellipse cx="216" cy="57" rx="6"  ry="4"  fill="#28aa30" opacity="0.25"/>

  <!-- Falling leaves -->
  <ellipse class="leaf1" cx="0" cy="0" rx="7.5" ry="3.5" fill="#2da83a"/>
  <ellipse class="leaf2" cx="0" cy="0" rx="5.5" ry="2.8" fill="#38c848"/>
  <ellipse class="leaf3" cx="0" cy="0" rx="6.5" ry="3.2" fill="#259530"/>
  <ellipse class="leaf4" cx="0" cy="0" rx="6"   ry="3"   fill="#2da83a"/>
  <ellipse class="leaf5" cx="0" cy="0" rx="5"   ry="2.5" fill="#38c848"/>

  <!-- ===== TEXT ===== -->
  <!-- Glow backing for title -->
  <text x="620" y="108"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="50" font-weight="700"
        fill="#1a6b28" filter="url(#glow)"
        text-anchor="middle">theabsurdisst</text>
  <!-- Title -->
  <text class="title" x="620" y="108"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="50" font-weight="700"
        fill="#58f07a"
        text-anchor="middle">theabsurdisst</text>

  <!-- Subtitle -->
  <text x="620" y="142"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16"
        fill="#3aaa58"
        text-anchor="middle">AI Engineer · Data Platform Builder</text>

  <!-- Divider -->
  <line x1="462" y1="160" x2="778" y2="160" stroke="#1a4828" stroke-width="1" opacity="0.7"/>

  <!-- Tech tags -->
  <text x="620" y="182"
        font-family="'SFMono-Regular', Consolas, 'Liberation Mono', monospace"
        font-size="12.5"
        fill="#2d8a48"
        text-anchor="middle">Python · SQL · LangGraph · Gemini · Snowflake · GCP · React</text>

  <!-- Decorative corner dots -->
  <circle cx="30"  cy="30"  r="1.5" fill="#1a4828" opacity="0.7"/>
  <circle cx="38"  cy="30"  r="1.5" fill="#1a4828" opacity="0.7"/>
  <circle cx="46"  cy="30"  r="1.5" fill="#1a4828" opacity="0.7"/>
  <circle cx="870" cy="30"  r="1.5" fill="#1a4828" opacity="0.7"/>
  <circle cx="862" cy="30"  r="1.5" fill="#1a4828" opacity="0.7"/>
  <circle cx="854" cy="30"  r="1.5" fill="#1a4828" opacity="0.7"/>
  <circle cx="30"  cy="230" r="1.5" fill="#1a4828" opacity="0.7"/>
  <circle cx="38"  cy="230" r="1.5" fill="#1a4828" opacity="0.7"/>
  <circle cx="46"  cy="230" r="1.5" fill="#1a4828" opacity="0.7"/>

  <!-- Border -->
  <rect width="900" height="260" fill="none" stroke="#1d5030" stroke-width="1.5" rx="14"/>
</svg>
